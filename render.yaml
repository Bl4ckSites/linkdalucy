services:
  - type: web
    name: linkdalucy-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: ENV
        sync: false
    runtime: python
    pythonVersion: 3.11.9
